name: Build APK

# Builds a release APK in the cloud and publishes it so it can be downloaded
# from the repo's Releases (and as a workflow artifact). The repo ships source
# only, so this generates the native android/ folder and applies the required
# Gradle config (minSdk 23 for Firebase, core-library desugaring for
# flutter_local_notifications) before building.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to create/update the Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate android/ project
        run: flutter create --platforms=android --org com.carcarepro --project-name carcare_pro .

      - name: Apply required Gradle config (minSdk 23 + desugaring)
        run: |
          set -e
          APP=android/app
          if [ -f "$APP/build.gradle.kts" ]; then
            f="$APP/build.gradle.kts"
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' "$f"
            sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' "$f"
            grep -q 'desugar_jdk_libs' "$f" || cat >> "$f" <<'EOG'

dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.2")
}
EOG
          elif [ -f "$APP/build.gradle" ]; then
            f="$APP/build.gradle"
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' "$f"
            sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' "$f"
            grep -q 'desugar_jdk_libs' "$f" || cat >> "$f" <<'EOG'

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'
}
EOG
          fi
          echo "----- patched gradle -----"; cat "$f"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: carcare-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish APK to "latest" Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          body: |
            Automatically built debug-signed release APK (for testing, not Play Store).
            Built from commit ${{ github.sha }}.
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
